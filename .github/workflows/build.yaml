name: Build NixOS and push to Cachix

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - uses: cachix/cachix-action@v15
        with:
          name: dotfiles-531547cf7bf4caaaad33
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # --- OR: Flake-based build (uncomment if using flakes) ---
      - run: nix build .#nixosConfigurations.alpakapro.config.system.build.toplevel
